name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      # `cargo test --tests` covers both unit + integration tests. The
      # prior split (`--lib` then `--tests`) ran unit tests twice for
      # no benefit. (audit fix — ci.yml MED.)
      - name: cargo test
        run: cargo test --all-targets

  # Compile-only Windows check. Catches Unix-only deps / libc calls at
  # PR time so the release.yml matrix doesn't surprise us at tag time.
  # Scopes to `--lib --bin loop-engine` because that's what release.yml
  # actually ships — integration tests under `tests/` use Unix-only
  # tokio + filesystem features by design and don't (and shouldn't)
  # compile for Windows.
  windows-check:
    name: windows compile check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc
      - name: cargo check --target x86_64-pc-windows-msvc
        run: cargo check --target x86_64-pc-windows-msvc --lib --bin loop-engine

  # The public-api stability gate was removed 2026-05-16 as part of the
  # 1.4.0 → 0.4.0 version reset. Per SemVer.org §4 ("Major version zero
  # is for initial development. Anything MAY change at any time."), a
  # strict public-API-must-match-baseline check is the wrong tool while
  # the crate is at 0.x — every additive RPC failed the gate. Re-add
  # the gate (with a fresh baseline) when crossing 1.0 for real, i.e.
  # when there's an external consumer + a commitment to API stability.
