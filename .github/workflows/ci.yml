name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test --lib
        run: cargo test --lib
      - name: cargo test --tests
        run: cargo test --tests

  public-api:
    name: public-api stability gate
    runs-on: ubuntu-latest
    # Baseline `public-api-v1.0.txt` is committed; this gate is now
    # load-bearing for SemVer durability.
    steps:
      - uses: actions/checkout@v4
      # Pinned nightly. cargo-public-api requires nightly (rustdoc-json),
      # but a moving `@nightly` produces drift across runs (e.g. auto-
      # derived !UnwindSafe → UnwindSafe flips driven by rustc internals,
      # not by our public surface). Pin to a known-good nightly; bump
      # intentionally when refreshing the baseline. Local devs MUST
      # rustup install the same nightly to reproduce:
      #   rustup install nightly-2026-05-13
      #
      # Action syntax note: dtolnay/rust-toolchain's git refs are channel
      # names (stable/beta/nightly), NOT specific versions. To pin a
      # nightly date, use the @master ref + `toolchain:` input.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-13
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-public-api
        run: cargo install --locked cargo-public-api
      - name: diff against v1.0 baseline
        run: |
          cargo public-api --simplified > public-api-current.txt
          diff public-api-v1.0.txt public-api-current.txt
